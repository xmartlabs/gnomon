name: Stable release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable version from pyproject.toml (X.Y.Z, without v)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out main with tags
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate requested version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          REQUESTED='${{ inputs.version }}'
          PROJECT_VERSION="$(python3 - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as handle:
              print(tomllib.load(handle)["project"]["version"])
          PY
          )"
          if [[ ! "$REQUESTED" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Requested version must be stable X.Y.Z, got: $REQUESTED" >&2
            exit 1
          fi
          if [[ "$REQUESTED" != "$PROJECT_VERSION" ]]; then
            echo "Requested version $REQUESTED does not match pyproject.toml $PROJECT_VERSION" >&2
            exit 1
          fi
          echo "VERSION=$REQUESTED" >> "$GITHUB_ENV"
          echo "TAG=v$REQUESTED" >> "$GITHUB_ENV"

      - name: Byte-compile paxel.py
        run: python3 -m py_compile paxel.py

      - name: Run tests (pipeline smoke + invariants + poster JS node --check)
        run: python3 -m unittest discover -s tests -v

      - name: Refuse an existing immutable version
        shell: bash
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Immutable release tag $TAG already exists; refusing to rewrite it." >&2
            exit 1
          fi
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "GitHub Release $TAG already exists; refusing to recreate it." >&2
            exit 1
          fi

      - name: Create and push annotated tags atomically
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" "$GITHUB_SHA" -m "Release $TAG"
          git tag -fa latest "$GITHUB_SHA" -m "Latest stable release: $TAG"
          git push --atomic origin "refs/tags/$TAG" "+refs/tags/latest"

      - name: Create GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$TAG" \
            --generate-notes

      - name: Verify release API and tag SHAs
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG" --jq .tag_name)"
          VERSION_REF_SHA="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" --jq .object.sha)"
          LATEST_REF_SHA="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/latest" --jq .object.sha)"
          test "$RELEASE_TAG" = "$TAG"
          test "$VERSION_REF_SHA" = "$(git rev-parse "$TAG^{tag}")"
          test "$LATEST_REF_SHA" = "$(git rev-parse "latest^{tag}")"
          test "$(git rev-list -n 1 "$TAG")" = "$GITHUB_SHA"
          test "$(git rev-list -n 1 latest)" = "$GITHUB_SHA"
